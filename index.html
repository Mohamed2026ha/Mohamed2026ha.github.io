body {
    margin: 0;

/* الهيدر */

    background: #111;

}

/* زر واتساب */
.whatsapp {
    display: inline-block;
    margin-top: 15px;
    padding: 12px 20px;
    background: #25D366;
    color: white;
    text-decoration: none;
    font-size: 18px;
    border-radius: 8px;
}

/* الجاليري */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 10px;
    padding: 15px;
}

.gallery img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    border-radius: 10px;
    transition: 0.3s;
}

.gallery img:hover {
    transform: scale(1.05);
}

/* الفوتر */
footer {
    text-align: center;
    padding: 15px;
    background: #111;
    color: white;
}
